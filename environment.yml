# Local (laptop) environment for the CPU pilot: prompt validation, the CLIP
# control run, scoring, and figures. Motion-model extraction happens on the
# cluster — use requirements-hpc.txt there instead (different Python and
# CUDA constraints; see its header).
name: sac-eval
channels:
  - pytorch
  - conda-forge
dependencies:
  - python=3.10
  - pytorch>=2.1
  - pip
  - pip:
    - numpy
    - scipy
    - scikit-learn
    - matplotlib
    - git+https://github.com/openai/CLIP.git
    - einops
